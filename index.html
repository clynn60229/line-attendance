<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f5f5f5;
}
 
#header{
 width:100%;
 height:80px;
 background:#716f70;
 display:flex;
 align-items:center;
 justify-content:flex-start; 
 padding-left:20px;    
 padding-top: env(safe-area-inset-top);
}

.headerLogo{
 height:50px;
}

#footer{
 width:100%;
 height:80px;
 background:#716f70;
 position:fixed;
 bottom:0;
}
 
.container{
 min-height: calc(100vh - 160px); /* 扣掉 header + footer */
 display:flex;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}
 
select, input{
    width:80%;
    max-width:300px;
    font-size:20px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:15px;
  } 
 
.formGroup{
 width:100%;
 display:flex;
 flex-direction:column;
 align-items:center;
} 
 
.logo{
 width:200px;
 margin-bottom:20px;
}

h2{
 font-size:70px;
 margin:20px 0 30px 0;
}
 
h3{
 font-size:50px;
 margin:20px 0 10px 0;
 text-align:center;
}
 
#menu{
 width:150%;
 display:flex;
 flex-direction:column;
 gap:15px;
 align-items:center;
}
 
button{
 width:180%;
 max-width:500px;
 font-size:50px;
 padding:30px;
 border-radius:20px;
 border:none;
 background:#dcdcdc;
 color:#007AFF;
 font-weight:600;
}

.submitBtn{
 width:85%;
 max-width:320px;
 height:60px;
 font-size:22px;
 border-radius:15px;
 border:none;
 background:#555;
 color:white;
 margin:25px auto;
 display:flex;
 align-items:center;
 justify-content:center;
}
 
#workBox, #leaveBox{
 display:flex;
 flex-direction:column;
 justify-content:center;   /* 垂直置中 */
 align-items:center;       /* 水平置中 */
 height:calc(100vh - 160px); /* 扣掉 header + footer */
 width:100%;
} 
 
#backBtn{
 position:fixed;
 top:20px;
 left:15px;
 font-size:28px;
 background:none;
 border:none;
 color:#007AFF;
 display:none;
 z-index:1000;
}
 
</style>

<body>

<div id="header">
  <img src="line logo.png" class="headerLogo">
</div>

<button id="backBtn" onclick="goBack()">←</button>
 
<div class="container">

<!-- 主頁 -->
 <div id="menu">
    <img src="line logo.png" class="logo">
    
    <h2>員工出勤</h2>
    
    <button onclick="showWorkTime()">
    上班時間出勤<br>
    <span style="font-size:22px;">(9:30~18:30)</span>
    </button>
    
    <button onclick="showOverTime()">以外時間出勤</button>
    
    <button onclick="showLeave()">請假</button>
  </div>
</div>
<div id="footer"></div>

</body> 

<!-- 出勤 -->
<div id="workBox" style="display:none">

<div class="formGroup">
  <h3>地點</h3>
  <select id="locationType">
  <option value="">請選擇</option>
  <option value="公司內">公司內</option>
  <option value="公司外">公司外</option>
  </select>
</div>

<div class="formGroup">
  <h3>類型</h3>
  <select id="clockType">
  <option value="">請選擇</option>
  <option value="上班">上班</option>
  <option value="下班">下班</option>
  </select>
</div>
 
<div class="formGroup">
 <h3>備註</h3>
 <input id="note" type="text" placeholder="例：TW Dior 內湖進場">
</div>
 
<button class="submitBtn" onclick="submitClock()">送出</button>

</div>

<!-- 請假 -->
<div id="leaveBox" style="display:none">

<h3>請假類型</h3>
<select id="leaveType">
<option value="">請選擇</option>
<option value="事假">事假</option>
<option value="病假">病假</option>
<option value="公假">公假</option>
<option value="年假">年假</option>
<option value="喪假">喪假</option>
<option value="婚假">婚假</option>
</select>

<h3>請假日期</h3>
<input id="leaveDate" type="text" placeholder="例如 3/20~3/25">

<button class="submitBtn" onclick="submitLeave()">送出</button>

</div>

</div>

<script>

const liffId = "2009436778-W5HckT9B"

const companyLat = 25.043333055473344
const companyLng = 121.58518373653834
const allowDistance = 400

const GAS_URL = "https://script.google.com/macros/s/AKfycbz_gzaT7cDSiw-5Gta_2E63Y-y-RdrIFt5-fmTQAMbjU6rQIAx-GbWjJ0SeIFf51DCc/exec"

let currentMode = ""

// 初始化
async function init(){
 await liff.init({liffId:liffId})
 if(!liff.isLoggedIn()){
  liff.login()
 }
}

// 顯示頁面
function showWorkTime(){
 currentMode = "worktime"
 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="block"
 document.getElementById("header").style.display="block"
 document.getElementById("pageTitle").innerText="上班時間出勤"
 document.getElementById("backBtn").style.display="block" 
}

function showOverTime(){
 currentMode = "overtime"
 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="block"
 document.getElementById("header").style.display="block"
 document.getElementById("pageTitle").innerText="以外時間出勤"
}

function showLeave(){
 document.getElementById("menu").style.display="none"
 document.getElementById("leaveBox").style.display="block"
 document.getElementById("header").style.display="block"
 document.getElementById("pageTitle").innerText="請假"
}

// 返回
function goBack(){
 document.getElementById("menu").style.display="block"
 document.getElementById("workBox").style.display="none"
 document.getElementById("leaveBox").style.display="none"
 document.getElementById("header").style.display="none"
}

// 計算距離
function getDistance(lat1,lon1,lat2,lon2){
 const R = 6371000
 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
  Math.sin(dLat/2)*Math.sin(dLat/2)+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
 return R*c
}

// 出勤
async function submitClock(){

 const btn = document.querySelector(".submitBtn")
 btn.disabled = true

 await liff.ready
 const profile = await liff.getProfile()

 const locationType = document.getElementById("locationType").value
 const type = document.getElementById("clockType").value
 const note = document.getElementById("note").value || ""

 if(!locationType){
  alert("請選擇地點")
  btn.disabled = false
  return
 }

 if(!type){
  alert("請選擇上班或下班")
  btn.disabled = false
  return
 }

 navigator.geolocation.getCurrentPosition(async function(pos){

  const lat = pos.coords.latitude
  const lng = pos.coords.longitude
  const distance = getDistance(lat,lng,companyLat,companyLng)

  if(locationType === "公司內" && distance > allowDistance){
   alert("❌不在公司範圍")
   btn.disabled = false
   return
  }

  const res = await fetch(GAS_URL,{
   method:"POST",
   body:new URLSearchParams({
    mode: currentMode,
    location: locationType,
    userId: profile.userId,
    name: profile.displayName,
    type: type,
    note: note,
    lat: lat,
    lng: lng
   })
  })

  const text = await res.text()
  alert(text)
  liff.closeWindow()

 })

}

// 請假
async function submitLeave(){

 const profile = await liff.getProfile()

 const type = document.getElementById("leaveType").value
 const date = document.getElementById("leaveDate").value

 if(!type){
  alert("請選擇請假類型")
  return
 }

 if(!date){
  alert("請輸入日期")
  return
 }

 await fetch(GAS_URL,{
  method:"POST",
  body:new URLSearchParams({
   mode:"leave",
   userId:profile.userId,
   name:profile.displayName,
   type:type,
   note:"請假日期: "+date
  })
 })

 alert("✅請假成功")
 liff.closeWindow()

}

init()

</script>
</script>
