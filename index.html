<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{

}

}

 top:50%;
 transform:translateY(-50%);

 border:none;

 height:100px;
 align-items:center;
 justify-content:center;

 padding:0;              /* 🔥 很重要 */
}

.headerLogo{

 right:50px;

}

#pageTitle{
 display:none; /* 🔥 預設隱藏 */
 color:white;
 font-size:60px;
 font-weight:bold;
 text-align:center;
 width:100%;
}

#footer{
 width:100%;
 height:80px;
 background:#716f70;
 position:fixed;
 bottom:0;
}
 
.container{
 width:100%;

}
 
select, input{
    width:80%;
    max-width:300px;
    font-size:20px;
    padding:15px;
    border-radius:10px;
    border:1px solid #ccc;
    margin-bottom:15px;
  }

 margin:20px 0 30px 0;
}

 margin:20px 0 10px 0;

}
 
#menu{
 width:150%;
 display:flex;
 flex-direction:column;
 gap:15px;
 align-items:center;
}
 
button{
 width:180%;
 max-width:500px;

 padding:40px;
 border-radius:20px;
 border:none;
 background:#dcdcdc;
 color:#007AFF;

}

.submitBtn{
 width:85%;
 max-width:320px;
 height:60px;
 font-size:22px;
 border-radius:15px;
 border:none;
 background:#555;
 color:white;
 margin:25px auto;
 display:flex;

 justify-content:center;
}
 
#workBox, #leaveBox{
 display:flex;
 flex-direction:column;

#backBtn{

/* 主頁置中 */

<body>

<div id="header">
  <button id="backBtn" onclick="goBack()">←</button>
  <img src="line logo.png" class="headerLogo">
  <div id="pageTitle">員工出勤</div>
 
</div>

<button id="backBtn" onclick="goBack()">←</button>
 
<div class="container centerMode" id="mainContainer">

<!-- 主頁 -->
 <div id="menu">
    <img src="line logo.png" class="logo">
    
    <h2>員工出勤</h2>
    
    <button onclick="showWorkTime()">
    上班時間出勤<br>
    <span style="font-size:35px;">(9:30~18:30)</span>
    </button>
    
    <button onclick="showOverTime()">以外時間出勤</button>
    
    <button onclick="showLeave()">請假</button>
  </div>
</div>
<div id="footer"></div>

</body> 

<!-- 出勤 -->
<div id="workBox" style="display:none">

   <div class="formGroup">
     <h3>地點</h3>
     <select id="locationType">
     <option value="">請選擇</option>
     <option value="公司內">公司內</option>
     <option value="公司外">公司外</option>
     </select>
   </div>
   
   <div class="formGroup">
     <h3>類型</h3>
     <select id="clockType">
     <option value="">請選擇</option>
     <option value="上班">上班</option>
     <option value="下班">下班</option>
     </select>
   </div>
    
   <div class="formGroup">
    <h3>備註</h3>
    <input id="note" type="text" placeholder="例：TW Dior 內湖進場">
   </div>
    
   <button class="submitBtn" onclick="submitClock()">送出</button>

</div>

<!-- 請假 -->
<div id="leaveBox" style="display:none">

<h3>請假類型</h3>
<select id="leaveType">
<option value="">請選擇</option>
<option value="事假">事假</option>
<option value="病假">病假</option>
<option value="公假">公假</option>
<option value="年假">年假</option>
<option value="喪假">喪假</option>
<option value="婚假">婚假</option>
</select>

<h3>請假日期</h3>
<input id="leaveDate" type="text" placeholder="例如 3/20~3/25">

<button class="submitBtn" onclick="submitLeave()">送出</button>

</div>

</div>

<script>

const liffId = "2009436778-W5HckT9B"

const companyLat = 25.043333055473344
const companyLng = 121.58518373653834
const allowDistance = 376
const allowDistance_2 = 360

const GAS_URL = "https://script.google.com/macros/s/AKfycby_fM5fqpUaoEl4iMOcYFVs1_rjsFGGfeFtYyAPbpPJHCjZNC-NpoA8ayIgDDkyWzLj1A/exec"

let currentMode = ""

// 初始化
async function init(){
 await liff.init({liffId:liffId})
 if(!liff.isLoggedIn()){
  liff.login()
 }
}

// 顯示頁面
function showWorkTime(){
 currentMode = "worktime"

 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="flex"
 
 document.getElementById("mainContainer").className = "container formMode"
 
 window.scrollTo(0,0)  
 
 document.getElementById("backBtn").style.display="block"
 document.getElementById("pageTitle").style.display="block"  // 🔥顯示
 document.getElementById("pageTitle").innerText="上班時間出勤"
}

function showOverTime(){
 currentMode = "overtime"

 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="flex"

 document.getElementById("mainContainer").className = "container formMode"
 
 window.scrollTo(0,0)  
 
 document.getElementById("backBtn").style.display="block"
 document.getElementById("pageTitle").style.display="block"
 document.getElementById("pageTitle").innerText="以外時間出勤"
}

function showLeave(){
 document.getElementById("menu").style.display="none"
 document.getElementById("leaveBox").style.display="flex"

 document.getElementById("mainContainer").className = "container formMode"
 
 window.scrollTo(0,0)  
 
 document.getElementById("backBtn").style.display="block"
 document.getElementById("pageTitle").style.display="block"
 document.getElementById("pageTitle").innerText="請假"
}

// 返回
function goBack(){
 document.getElementById("menu").style.display="flex"
 document.getElementById("workBox").style.display="none"
 document.getElementById("leaveBox").style.display="none"

 document.getElementById("mainContainer").className = "container centerMode" // 🔥這行是關鍵

 document.getElementById("backBtn").style.display="none"
 document.getElementById("pageTitle").style.display="none"
}

// 計算距離
function getDistance(lat1,lon1,lat2,lon2){
 const R = 6371000
 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
  Math.sin(dLat/2)*Math.sin(dLat/2)+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
 return R*c
}

// 出勤
async function submitClock(){

 const btn = document.querySelector(".submitBtn")
 btn.disabled = true

 await liff.ready
 const profile = await liff.getProfile()

 const locationType = document.getElementById("locationType").value
 const type = document.getElementById("clockType").value
 const note = document.getElementById("note").value || ""

 if(!locationType){
  alert("請選擇地點")
  btn.disabled = false
  return
 }

 if(!type){
  alert("請選擇上班或下班")
  btn.disabled = false
  return
 }

 navigator.geolocation.getCurrentPosition(async function(pos){

  const lat = pos.coords.latitude
  const lng = pos.coords.longitude
  const distance = getDistance(lat,lng,companyLat,companyLng)

  if(locationType === "公司內" && distance > allowDistance || distance < allowDistance_2){
   alert("❌不在公司範圍")
   btn.disabled = false
   return
  }

  const res = await fetch(GAS_URL,{
   method:"POST",
   body:new URLSearchParams({
    mode: currentMode,
    location: locationType,
    userId: profile.userId,
    name: profile.displayName,
    type: type,
    note: note,
    lat: lat,
    lng: lng
   })
  })

  const text = await res.text()
  alert(text)
  liff.closeWindow()

 })

}

// 請假
async function submitLeave(){

 const profile = await liff.getProfile()

 const type = document.getElementById("leaveType").value
 const date = document.getElementById("leaveDate").value

 if(!type){
  alert("請選擇請假類型")
  return
 }

 if(!date){
  alert("請輸入日期")
  return
 }

 await fetch(GAS_URL,{
  method:"POST",
  body:new URLSearchParams({
   mode:"leave",
   userId:profile.userId,
   name:profile.displayName,
   type:type,
   note:"請假日期: "+date
  })
 })

 alert("✅請假成功")
 liff.closeWindow()

}

init()

</script>
</script>
