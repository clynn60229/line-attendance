<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<title>Feta 員工出勤</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#f5f5f5;
}
 
#header{
 width:100%;
 height:150px;
 background:#716f70;
 display:flex;
 align-items:center;
 justify-content:center;
 position:relative;

 padding-top: env(safe-area-inset-top);
}
 
.headerLogo{
 position:absolute;
 right:50px;
 height:120px;
}

#pageTitle{
 display:none; /* 🔥 預設隱藏 */
 color:white;
 font-size:50px;
 font-weight:bold;
 text-align:center;
 width:100%;
}

#footer{
 width:100%;
 height:100px;
 background:#716f70;
 position:fixed;
 bottom:0;
}
 
.container{
 width:100%;
 max-width:420px;
 margin:0 auto;
}
 
select, input{
 width:90%;
 max-width:380px;

 font-size:35px;      /* 🔥 放大字 */
 padding:25px;        /* 🔥 放大高度 */

 border-radius:15px;
 border:1px solid #ccc;
}
 
#note{
 width:120%;
 max-width:420px;

 height:140px;       /* 🔥 高度 */
 font-size:35px;

 padding:20px;
 border-radius:15px;
 border:1px solid #ccc;

 resize:none;        /* 🔥 不讓使用者亂拉 */
}
 
.formGroup{
 width:100%;
 display:flex;
 flex-direction:column;
 align-items:center;
 margin-bottom:40px;
}
 
.logo{
 width:250px;
 margin-bottom:20px;
}

h2{
 font-size:100px;
 margin:20px 0 40px 0;
}
 
h3{
 font-size:80px;
 margin:20px 0 10px 0;
 text-align:center;
}
 
#menu{
 width:150%;
 display:flex;
 flex-direction:column;
 gap:15px;
 align-items:center;
}
 
button{
 width:90%;              /* 建議不要 180% 會跑版 */
 max-width:420px;

 height:160px;           /* 🔥 固定高度 */
 
 font-size:50px;
 border-radius:20px;
 border:none;
 background:#dcdcdc;
 color:#007AFF;
 font-weight:600;

 display:flex;           /* 🔥 讓內容置中 */
 flex-direction:column;
 align-items:center;
 justify-content:center;
}

.submitBtn{
 width:80%;
 max-width:280px;

 height:120px;        /* 🔥 變高 */
 font-size:40px;      /* 🔥 字變大 */

 border-radius:20px;
 background:#555;
 color:white;

 display:flex;
 align-items:center;
 justify-content:center;

 margin-top:40px;
}
 
#workBox{
 width:100%;

 display:flex;
 flex-direction:column;
 align-items:center;

 justify-content:flex-start;  /* 🔥 不要置中，改靠上 */
 gap:30px;                    /* 🔥 每個區塊間距 */

 margin-top:40px;             /* 🔥 整體往下微調（可調） */
}
 
#backBtn{
 position:absolute;
 left:25px;
 top:50%;
 transform:translateY(-50%);

 font-size:60px;
 font-weight:300;

 background:none;
 border:none;
 color:white;

 width:80px;
 height:80px;

 display:none;              /* 🔥 一開始隱藏 */
 align-items:center;
 justify-content:center;
 padding:0;
}
 
/* 主頁置中 */
.centerMode{
 min-height:calc(100vh - 250px);
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 transform:translateY(-40px);
}

/* 內頁：正常表單 */
.formMode{
 display:flex;
 flex-direction:column;
 align-items:center;

 padding-top:40px;          /* 🔥 控制整體往上 */
 padding-bottom:120px;

 width:100%;
}
 
</style>

<body>

<div id="header">
  <button id="backBtn" onclick="goBack()">←</button>
  <img src="line logo.png" class="headerLogo">
  <div id="pageTitle">員工出勤</div>
 
</div>
 
<div class="container centerMode" id="mainContainer">

<!-- 主頁 -->
 <div id="menu">
    <img src="line logo.png" class="logo">
    
    <h2>員工出勤</h2>
    
    <button onclick="showWorkTime()">
    上班時間出勤<br>
    <span style="font-size:40px;">(9:30~18:30)</span>
    </button>
    
    <button onclick="showOverTime()">以外時間出勤</button>
   
  </div>
</div>

<!-- 出勤 -->
<div id="workBox" style="display:none">

   <div class="formGroup">
     <h3>地點</h3>
     <select id="locationType">
     <option value="">請選擇</option>
     <option value="公司內">公司內</option>
     <option value="公司外">公司外</option>
     </select>
   </div>
   
   <div class="formGroup">
     <h3>類型</h3>
     <select id="clockType">
     <option value="">請選擇</option>
     <option value="上班">上班</option>
     <option value="下班">下班</option>
     </select>
   </div>
    
   <div class="formGroup">
    <h3>備註</h3>
    <textarea id="note" placeholder="例：TW Dior 內湖進場"></textarea>
   </div>
    
   <button class="submitBtn" onclick="submitClock()">送出</button>

</div>
 
<div id="footer"></div>
</body>

<script>
let isSubmitting = false;
const liffId = "2009436778-W5HckT9B"

const companyLat = 25.043333055473344
const companyLng = 121.58518373653834
const allowDistance = 376
const allowDistance_2 = 360

const GAS_URL = "https://script.google.com/macros/s/AKfycby_fM5fqpUaoEl4iMOcYFVs1_rjsFGGfeFtYyAPbpPJHCjZNC-NpoA8ayIgDDkyWzLj1A/exec"

let currentMode = ""

// 初始化
async function init(){
 await liff.init({liffId:liffId})
 if(!liff.isLoggedIn()){
  liff.login()
 }
}

// 顯示頁面
function showWorkTime(){
 currentMode = "worktime"

 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="flex"
 
 document.getElementById("mainContainer").className = "container formMode"
 
 window.scrollTo(0,0)  
 
 document.getElementById("backBtn").style.display="block"
 document.getElementById("pageTitle").style.display="block"  // 🔥顯示
 document.getElementById("pageTitle").innerText="上班時間出勤"
}

function showOverTime(){
 currentMode = "overtime"

 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="flex"

 document.getElementById("mainContainer").className = "container formMode"
 
 window.scrollTo(0,0)  
 
 document.getElementById("backBtn").style.display="block"
 document.getElementById("pageTitle").style.display="block"
 document.getElementById("pageTitle").innerText="以外時間出勤"
}
 
// 返回
function goBack(){
 document.getElementById("menu").style.display="flex"
 document.getElementById("workBox").style.display="none"

 document.getElementById("mainContainer").className = "container centerMode" // 🔥這行是關鍵

 document.getElementById("backBtn").style.display="none"
 document.getElementById("pageTitle").style.display="none"
}

// 計算距離
function getDistance(lat1,lon1,lat2,lon2){
 const R = 6371000
 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
  Math.sin(dLat/2)*Math.sin(dLat/2)+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
 return R*c
}

// 出勤
async function submitClock(){

  // 🚫 防連點
  if(isSubmitting){
    alert("⏳ 處理中，請勿重複點擊")
    return
  }

  isSubmitting = true   // 🔒 上鎖

  const btn = document.querySelector(".submitBtn")
  const originalText = btn.innerText

  try{

    // 🔄 UI 狀態
    btn.disabled = true
    btn.innerText = "定位中..."

    await liff.ready
    const profile = await liff.getProfile()

    const locationType = document.getElementById("locationType").value
    const type = document.getElementById("clockType").value
    const note = document.getElementById("note").value || ""

    if(!locationType){
      throw new Error("請選擇地點")
    }

    if(!type){
      throw new Error("請選擇上班或下班")
    }

    // =========================
    // 📍 定位
    // =========================
    const position = await new Promise((resolve, reject)=>{
      navigator.geolocation.getCurrentPosition(resolve, reject)
    })

    const lat = position.coords.latitude
    const lng = position.coords.longitude
    const distance = getDistance(lat,lng,companyLat,companyLng)

    // ⚠️ 這裡你原本邏輯有 bug（我順便幫你修）
    if(locationType === "公司內" && (distance > allowDistance || distance < allowDistance_2)){
      throw new Error("❌不在公司範圍：" + Math.floor(distance) + "m")
    }

    // =========================
    // 🌐 送出
    // =========================
    btn.innerText = "送出中..."

    const res = await fetch(GAS_URL,{
      method:"POST",
      body:new URLSearchParams({
        mode: currentMode,
        location: locationType,
        userId: profile.userId,
        name: profile.displayName,
        type: type,
        note: note,
        lat: lat,
        lng: lng
      })
    })

    const text = await res.text()

    alert("✅ 打卡成功")

    liff.closeWindow()

  }catch(err){

    console.error(err)
    alert("❌ " + err.message)

  }finally{

    // 🔓 解鎖
    isSubmitting = false

    // 🔄 按鈕恢復
    btn.disabled = false
    btn.innerText = originalText
  }
}

init()

</script>
