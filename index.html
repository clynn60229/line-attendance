<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body{
 margin:0;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 font-family:Arial;
 background:#f5f5f5;
}
 
.logo{
 width:200px;
 margin-bottom:20px;
}
 
.container{
 text-align:center;
 width:100%;
 max-width:420px;
 display:flex;
 flex-direction:column;
 align-items:center;
}

h2{
 font-size:70px;
 margin:15px 0 30px 0;
}
 
#menu{
 width:60%;
 display:flex;
 flex-direction:column;
 gap:15px;
 align-items:center;
}
 
button{
 width:100%;
 max-width:320px;
 font-size:30px;
 padding:30px;
 border-radius:20px;
 border:none;
 background:#dcdcdc;
 color:#007AFF;
 font-weight:600;
}

.submitBtn{
 width:120px;
 height:70px;
 font-size:35px;
 border-radius:15px;
 border:none;
 background:#555;
 color:white;
 margin:30px auto;
 display:block;
}
</style>

<body>

<div class="container">
 
<img src="line logo.png" class="logo">
 
<h2 style="font-size:70px;">員工出勤</h2>

<!-- 主選單 -->
<div id="menu" style="display:flex;flex-direction:column;gap:15px">

<button onclick="showWorkTime()">
上班時間出勤<br>
<span style="font-size:33px;">(9:30~18:30)</span>
</button>

<button onclick="showOverTime()">以外時間出勤</button>

<button onclick="showLeave()">請假</button>

</div>

<!-- 出勤 -->
<div id="workBox" style="display:none">

<h2>地點</h2>
<select id="locationType" style="font-size:30px;width:80%;height:70px;">
<option value="">請選擇</option>
<option value="公司內">公司內</option>
<option value="公司外">公司外</option>
</select>

<h2>類型</h2>
<select id="clockType" style="font-size:30px;width:80%;height:70px;">
<option value="">請選擇</option>
<option value="上班">上班</option>
<option value="下班">下班</option>
</select>

<h2>備註</h2>
<input id="note" type="text"
placeholder="例如：TW Dior 內湖進場"
style="font-size:30px;width:80%;padding:15px;">

<button class="submitBtn" onclick="submitClock()">送出</button>

</div>

<!-- 請假 -->
<div id="leaveBox" style="display:none">

<h2>請假類型</h2>
<select id="leaveType" style="font-size:30px;width:80%;height:70px;">
<option value="">請選擇</option>
<option value="事假">事假</option>
<option value="病假">病假</option>
<option value="公假">公假</option>
<option value="年假">年假</option>
</select>

<h2>請假日期</h2>
<input id="leaveDate" type="text"
placeholder="例如 3/20~3/25"
style="font-size:30px;width:80%;padding:15px;">

<button class="submitBtn" onclick="submitLeave()">送出</button>

</div>

</div>

<script>

const liffId = "2009436778-W5HckT9B"

const companyLat = 25.043333055473344
const companyLng = 121.58518373653834
const allowDistance = 400

const GAS_URL = "https://script.google.com/macros/s/AKfycbz_gzaT7cDSiw-5Gta_2E63Y-y-RdrIFt5-fmTQAMbjU6rQIAx-GbWjJ0SeIFf51DCc/exec"

let currentMode = "" // worktime / overtime

// 初始化
async function init(){
 await liff.init({liffId:liffId})
 if(!liff.isLoggedIn()){
  liff.login()
 }
}

// 切換頁面
function showWorkTime(){
 currentMode = "worktime"
 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="block"
}

function showOverTime(){
 currentMode = "overtime"
 document.getElementById("menu").style.display="none"
 document.getElementById("workBox").style.display="block"
}

function showLeave(){
 document.getElementById("menu").style.display="none"
 document.getElementById("leaveBox").style.display="block"
}

// 計算距離
function getDistance(lat1,lon1,lat2,lon2){
 const R = 6371000
 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
  Math.sin(dLat/2)*Math.sin(dLat/2)+
  Math.cos(lat1*Math.PI/180)*
  Math.cos(lat2*Math.PI/180)*
  Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))
 return R*c
}

// 出勤送出
async function submitClock(){

 await liff.ready
 const profile = await liff.getProfile()

 const locationType = document.getElementById("locationType").value
 const type = document.getElementById("clockType").value
 const note = document.getElementById("note").value || ""

 if(!locationType){
  alert("請選擇地點")
  return
 }

 if(!type){
  alert("請選擇上班或下班")
  return
 }

 navigator.geolocation.getCurrentPosition(async function(pos){

  const lat = pos.coords.latitude
  const lng = pos.coords.longitude

  const distance = getDistance(lat,lng,companyLat,companyLng)

  // 公司內限制
  if(locationType === "公司內"){
   if(distance > allowDistance){
    alert("❌不在公司範圍")
    return
   }
  }

  const res = await fetch(GAS_URL,{
   method:"POST",
   body:new URLSearchParams({
    mode: currentMode,
    location: locationType,
    userId: profile.userId,
    name: profile.displayName,
    type: type,
    note: note,
    lat: lat,
    lng: lng
   })
  })

  const text = await res.text()
  alert(text)
  liff.closeWindow()

 })

}

// 請假
async function submitLeave(){

 await liff.ready
 const profile = await liff.getProfile()

 const type = document.getElementById("leaveType").value
 const date = document.getElementById("leaveDate").value

 if(!type){
  alert("請選擇請假類型")
  return
 }

 if(!date){
  alert("請輸入日期")
  return
 }

 await fetch(GAS_URL,{
  method:"POST",
  body:new URLSearchParams({
   mode:"leave",
   userId:profile.userId,
   name:profile.displayName,
   type:type,
   note:"請假日期: "+date
  })
 })

 alert("✅請假成功")
 liff.closeWindow()

}

init()

</script>
