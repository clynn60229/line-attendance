<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>

body{
  margin:0;
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
}

.container{
  text-align:center;
}
.logo{
  width:210px;
  margin-bottom:10px;
}

button{
  font-size:60px;
  padding:40px 80px;
}

</style>

</head>

<body>

<div class="container">

<img src="line logo.png" class="logo">
  
<h2 style="font-size:150px;">員工打卡</h2>
<button onclick="clock()">打卡</button>

<script>

const liffId = "2009436778-W5HckT9B"

const companyLat = 25.043333055473344
const companyLng = 121.58518373653834
const allowDistance = 600

async function init(){

 await liff.init({liffId:liffId})

 if(!liff.isLoggedIn()){
  liff.login()
 }
}
  
function getDistance(lat1,lon1,lat2,lon2){

 const R = 6371000

 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
 Math.sin(dLat/2)*Math.sin(dLat/2)+
 Math.cos(lat1*Math.PI/180)*
 Math.cos(lat2*Math.PI/180)*
 Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

 return R*c

}

async function clock(){
  
 const profile = await liff.getProfile()

 navigator.geolocation.getCurrentPosition(function(pos){

 const lat = pos.coords.latitude
 const lng = pos.coords.longitude

 const distance = getDistance(lat,lng,companyLat,companyLng)

 if(distance > allowDistance){

 alert("不在公司範圍")

 return

 }

 fetch("https://script.google.com/macros/s/AKfycbzPst8Hlc7VscPCbst9KMGLz-tVifdN1_U9Bww-i6Ql-VeXl5E14GekMto2U7Kb7VeX/exec",{

 method:"POST",

 body:JSON.stringify({

 name:profile.displayName,
 userId:profile.userId,
 lat:lat,
 lng:lng

 })

 })
 .then(res=>res.json())
 .then(result=>{
     
 if(result=="上班"){
 alert("上班打卡成功")
 }

 else if(result=="下班"){
 alert("下班打卡成功")
 })

 })

}
  
init()

</script>
