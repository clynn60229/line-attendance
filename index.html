<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<h2>員工打卡</h2>
<button onclick="clock()">打卡</button>

<script>

const liffId = "2009436775-BqM3kFeE"

const companyLat = 24.147736
const companyLng = 120.673648
const allowDistance = 200

async function init(){

 await liff.init({liffId:liffId})

 if(!liff.isLoggedIn()){
  liff.login()
 }
}
  
function getDistance(lat1,lon1,lat2,lon2){

 const R = 6371000

 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
 Math.sin(dLat/2)*Math.sin(dLat/2)+
 Math.cos(lat1*Math.PI/180)*
 Math.cos(lat2*Math.PI/180)*
 Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

 return R*c

}

async function clock(){

 const profile = await liff.getProfile()

 navigator.geolocation.getCurrentPosition(function(pos){

 const lat = pos.coords.latitude
 const lng = pos.coords.longitude

 const distance = getDistance(lat,lng,companyLat,companyLng)

 if(distance > allowDistance){

 alert("不在公司範圍")

 return

 }

 fetch("https://script.google.com/macros/s/AKfycbxGWyaCLBpeO7mOhyJhHOEfng9Y-eh2BToQzfUV5jwepwarRwdp6LFKf2NVudRqEgSD/exec",{

 method:"POST",

 body:JSON.stringify({

 name:profile.displayName,
 userId:profile.userId,
 lat:lat,
 lng:lng

 })

 })
 .then(res=>res.text())
 .then(result=>{

 if(result=="CheckIn"){
 alert("上班打卡成功")
 }

 else if(result=="CheckOut"){
 alert("下班打卡成功")
 }

 else{
 alert("今天已打卡兩次")
 }

 })

 })

}

init()

</script>
