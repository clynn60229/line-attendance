<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>

body{
margin:0;
height:90vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.container{
text-align:center;
}
 
.logo{
  width:200px;
  margin-bottom:20px;
}
button{
font-size:60px;
padding:40px 80px;
}

</style>

<body>

<div class="container">

<img src="line logo.png" class="logo">

<h2 style="font-size:80px;">員工打卡</h2>

<div style="display:flex;flex-direction:column;gap:15px">
<button onclick="companyClock()">公司打卡</button>
<button onclick="showOutside()">外務打卡</button>
<button onclick="showLeave()">請假</button>

<br><br><br>
 
<!-- 外務輸入區 (預設隱藏) -->
<div id="outsideBox" style="display:none">

<h2 style="font-size:40px;">請輸入外務原因</h2> 
<input id="note" type="text"
placeholder="例如：內湖進場"
style="font-size:40px;padding:20px;width:80%">

<br><br>

<button onclick="outsideClock()">送出</button>
</div>
 
<div id="leaveBox" style="display:none;margin-top:20px">

<h2 style="font-size:40px;">請選擇請假原因</h2> 

<select id="leaveType">
<option value="">請選擇</option>
<option value="婚假">婚假</option>
<option value="喪假">喪假</option>
<option value="病假">病假</option>
<option value="事假">事假</option>
</select>

<br><br>

<button onclick="leaveSubmit()">送出</button>

</div>
</div>
 
<script>

const liffId = "2009436778-W5HckT9B"

const companyLat = 25.043333055473344
const companyLng = 121.58518373653834

const allowDistance = 10000

const GAS_URL = "https://script.google.com/macros/s/AKfycbz_gzaT7cDSiw-5Gta_2E63Y-y-RdrIFt5-fmTQAMbjU6rQIAx-GbWjJ0SeIFf51DCc/exec"


async function init(){

 await liff.init({liffId:liffId})

 if(!liff.isLoggedIn()){
  liff.login()
 }

}
 
function showOutside(){

 document.getElementById("outsideBox").style.display = "block"

}
 
function showLeave(){

document.getElementById("leaveBox").style.display="block"

} 
function getDistance(lat1,lon1,lat2,lon2){

 const R = 6371000

 const dLat = (lat2-lat1)*Math.PI/180
 const dLon = (lon2-lon1)*Math.PI/180

 const a =
 Math.sin(dLat/2)*Math.sin(dLat/2)+
 Math.cos(lat1*Math.PI/180)*
 Math.cos(lat2*Math.PI/180)*
 Math.sin(dLon/2)*Math.sin(dLon/2)

 const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

 return R*c

}


async function companyClock(){

 await liff.ready

 const profile = await liff.getProfile()

 navigator.geolocation.getCurrentPosition(

 async function(pos){

 const lat = pos.coords.latitude
 const lng = pos.coords.longitude

 const distance = getDistance(lat,lng,companyLat,companyLng)

 if(distance > allowDistance){
  alert("❌不在公司範圍")
  return
 }

 const res = await fetch(GAS_URL,{
  method:"POST",
  body:new URLSearchParams({
   mode:"company",
   userId:profile.userId,
   name:profile.displayName,
   lat:lat,
   lng:lng
  })
 })

 const text = await res.text()

 alert(text)
 liff.closeWindow()

 }

 )

}
 
async function outsideClock(){

 await liff.ready

 const profile = await liff.getProfile()
 const note = document.getElementById("note").value

 if(!note){
 alert("⚠️請輸入外務原因")
 return
}
 
 navigator.geolocation.getCurrentPosition(async function(pos){

 const lat = pos.coords.latitude
 const lng = pos.coords.longitude

 const res = await fetch(GAS_URL,{
  method:"POST",
  body:new URLSearchParams({
   mode:"outside",
   userId:profile.userId,
   name:profile.displayName,
   lat:lat,
   lng:lng,
   note:note
  })
 })

 const text = await res.text()

 alert(text)
 liff.closeWindow()

 })

}
 
async function leaveSubmit(){

const profile = await liff.getProfile()

const leaveType = document.getElementById("leaveType").value

if(!leaveType){
 alert("請選擇請假類型")
 return
}

await fetch(GAS_URL,{
 method:"POST",
 body:new URLSearchParams({
  userId:profile.userId,
  name:profile.displayName,
  type:leaveType
 })
})

alert("請假成功")

liff.closeWindow()

} 
init()

</script>
